name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write

env:
  APP_NAME: 'sb'
  MODULE_REPO: 'github.com/saltyorg/sb-go'

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    outputs:
      version: ${{ steps.determine_version.outputs.version }}
      git_commit: ${{ steps.get_git_commit.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Get Git Commit SHA
        id: get_git_commit
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine Version
        id: determine_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VERSION: ${{ steps.determine_version.outputs.version }}
          GIT_COMMIT: ${{ steps.get_git_commit.outputs.short_sha }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ldflags="-w -s -X '${MODULE_REPO}/internal/runtime.Version=${VERSION}' -X '${MODULE_REPO}/internal/runtime.GitCommit=${GIT_COMMIT}' -X '${MODULE_REPO}/internal/runtime.DisableSelfUpdate=false'"
          
          # For GitHub releases, use the selfupdate naming convention
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            OUTPUT_NAME="${APP_NAME}_${GOOS}_${GOARCH}"
          else
            OUTPUT_NAME="${APP_NAME}-${GOARCH}"
          fi
          
          go build -trimpath -ldflags="${ldflags}" -o "${OUTPUT_NAME}" .
          echo "output_name=${OUTPUT_NAME}" >> "$GITHUB_OUTPUT"
        id: build_binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-linux-${{ matrix.goarch }}
          path: ${{ steps.build_binary.outputs.output_name }}

  release:
    name: Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.APP_NAME }}-linux-*
          merge-multiple: true
          path: dist

      - name: Determine Version
        id: determine_version
        run: echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### Commits since $PREVIOUS_TAG:" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD >> release_notes.md
          else
            echo "### Commits in this release:" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ steps.determine_version.outputs.version }}" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.determine_version.outputs.version }}
          name: Release ${{ steps.determine_version.outputs.version }}
          draft: false
          body_path: release_notes.md
          prerelease: false
          files: |
            dist/${{ env.APP_NAME }}_linux_amd64
            dist/${{ env.APP_NAME }}_linux_arm64

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            # Read the release notes and format for Discord
            RELEASE_NOTES=$(cat release_notes.md)

            # Truncate if too long (Discord has a 2000 char limit for description)
            if [ ${#RELEASE_NOTES} -gt 1800 ]; then
              RELEASE_NOTES="${RELEASE_NOTES:0:1800}..."
            fi

            # Create Discord embed payload
            cat > discord_payload.json << EOF
          {
            "username": "GitHub",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [
              {
                "title": "🚀 New Release: ${{ steps.determine_version.outputs.version }}",
                "description": "$(echo "$RELEASE_NOTES" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')",
                "color": 5814783,
                "url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.determine_version.outputs.version }}",
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
                "footer": {
                  "text": "sb-go",
                  "icon_url": "https://github.com/${{ github.repository_owner }}.png"
                },
                "fields": [
                  {
                    "name": "📥 Download",
                    "value": "[amd64](https://github.com/${{ github.repository }}/releases/download/${{ steps.determine_version.outputs.version }}/sb_linux_amd64) | [arm64](https://github.com/${{ github.repository }}/releases/download/${{ steps.determine_version.outputs.version }}/sb_linux_arm64)",
                    "inline": true
                  },
                  {
                    "name": "📝 Full Changelog",
                    "value": "[View Changes](https://github.com/${{ github.repository }}/releases/tag/${{ steps.determine_version.outputs.version }})",
                    "inline": true
                  }
                ]
              }
            ]
          }
          EOF

            # Send to Discord
            curl -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d @discord_payload.json
          fi
